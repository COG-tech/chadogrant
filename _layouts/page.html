---
layout: default
---
<article class="page-shell">
  <header class="page-header">
    <div class="page-header__inner">
      <p class="page-header__eyebrow">{{ page.eyebrow | default: site.data.site.role_label }}</p>
      <h1>{{ page.title }}</h1>
      {% if page.description %}
        <p class="page-header__lead">{{ page.description }}</p>
      {% endif %}
    </div>
  </header>
  <div class="page-content">
    {{ content }}
  </div>
</article>
