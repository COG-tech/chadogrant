{% assign nav = site.data.site.navigation %}
<header class="site-header">
  <div class="site-header__inner">
    <a class="brandmark" href="{{ '/' | relative_url }}">
      <span class="brandmark__monogram">CG</span>
      <span class="brandmark__text">
        <strong>Chad O. Grant</strong>
        <small>Writing, books, and macro analysis</small>
      </span>
    </a>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
      <span class="nav-toggle__label">Menu</span>
    </button>
    <nav id="site-nav" class="site-nav" aria-label="Primary">
      <ul>
        {% for item in nav %}
          <li>
            <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} aria-current="page"{% endif %}>
              {{ item.label }}
            </a>
          </li>
        {% endfor %}
      </ul>
      <a class="button button--small" href="{{ '/contact/' | relative_url }}">Contact</a>
    </nav>
  </div>
</header>
