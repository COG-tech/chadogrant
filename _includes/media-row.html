{% assign item = include.item %}
<article class="media-row">
  <div class="media-row__meta">
    <span>{{ item.date_label }}</span>
    <strong>{{ item.outlet }}</strong>
  </div>
  <div class="media-row__body">
    <p class="media-row__eyebrow">{{ item.outlet }}</p>
    <h3>{{ item.title }}</h3>
    <p>{{ item.summary }}</p>
  </div>
  <div class="media-row__action">
    {% if item.url != blank %}
      <a class="button button--small button--secondary" href="{{ item.url }}" target="_blank" rel="noreferrer">Open source</a>
    {% endif %}
  </div>
</article>
