{% assign item = include.item %}
<article class="media-row">
  <div class="media-row__meta">
    <span>{{ item.date_label }}</span>
    <strong>{{ item.outlet }}</strong>
  </div>
  <div class="media-row__body">
    <h3>{{ item.title }}</h3>
    <p>{{ item.summary }}</p>
  </div>
  <div class="media-row__action">
    {% if item.url != blank %}
      <a class="text-link" href="{{ item.url }}" target="_blank" rel="noreferrer">Open</a>
    {% else %}
      <span class="status-chip status-chip--subtle">Link pending</span>
    {% endif %}
  </div>
</article>
