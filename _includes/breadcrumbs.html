{% assign current_label = page.breadcrumb_title | default: page.title %}
<nav class="breadcrumbs" aria-label="Breadcrumb">
  <ol>
    <li><a href="{{ '/' | relative_url }}">Home</a></li>
    {% if page.section == "videos" %}
      <li><a href="{{ '/videos/' | relative_url }}">Videos</a></li>
    {% elsif page.section == "articles" %}
      <li><a href="{{ '/articles/' | relative_url }}">Articles</a></li>
    {% endif %}
    <li aria-current="page">{{ current_label }}</li>
  </ol>
</nav>
