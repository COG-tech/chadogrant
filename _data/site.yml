intro:
  title: A Real Home For The Work
  body: >-
    Chad O. Grant's work sits at the intersection of macro, investing, books,
    and public commentary. The goal of this site is not to act as a thin link
    page, but as a durable record of ideas, publications, appearances, and
    themes that define the body of work.
about:
  short_bio: >-
    Chad O. Grant writes about macroeconomics, investing, global analysis, and
    the relationship between markets, institutions, and power.
  long_story_intro: >-
    This profile page is intentionally written as a public reference point for
    Chad O. Grant's work. It should be refined with verified biographical
    details, publication history, and official profile links before launch.
  long_story: >-
    The throughline of the work is a close reading of change: how capital
    behaves under pressure, how institutions shape outcomes, how regions rise,
    and how ideas move from private conviction into public argument. Across
    essays, books, and video commentary, Chad O. Grant is developing a body of
    work designed to be intellectually serious, globally aware, and accessible
    to a broad audience.
  what_i_write_about:
    - Macroeconomics and market regimes
    - Investing, risk, and capital allocation
    - Global analysis and structural power shifts
    - Books, essays, and public-facing commentary
  work_locations:
    - Long-form articles and notes
    - Video commentary and briefings
    - Books and book-related updates
    - Interviews, appearances, and media features
