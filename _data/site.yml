about:
  short_bio: >-
    Chad O. Grant writes and comments on macroeconomics, geopolitics, and
    structural change through S.C.O.P.E. Report while also publishing
    science-fiction writing through Dawn Archives. His work spans short-form
    video, long-form essays, serialized fiction, and books including Dear Son
    and Dawn.
  long_story_intro: >-
    Across markets, politics, and fiction, the throughline is the same: how
    power works, how systems behave under pressure, and what changes when old
    assumptions stop holding.
  long_story: >-
    On Substack and YouTube, Chad O. Grant publishes S.C.O.P.E. Report, a macro
    and geopolitical commentary platform organized around the intersections of
    Science, Culture, Order, Politics, and Education. The writing and videos
    track hidden financial pressure, labor-market shifts, strategic leverage,
    and the broader direction of the global order. Alongside that work, Dawn
    Archives extends the fiction side of the catalog with chapters, lore, and
    world notes tied to DAWN: A Whisper of Destiny. The books widen the range
    further: from family and legacy in Dear Son to speculative conflict and
    power in Dawn, with a separate public listing for The Twin Titans.
  what_i_write_about:
    - Macro regimes, labor, inflation, and growth signals
    - Geopolitics, state power, and structural economic change
    - Investing, leverage, and capital under pressure
    - Fiction, worldbuilding, and serialized story development
    - Books, essays, and long-form public commentary
  work_locations:
    - S.C.O.P.E. Report on YouTube
    - S.C.O.P.E. Report on Substack
    - Dawn Archives on Substack
    - Google Play book listings
    - Public book retail listings and future media references
  official_identity: >-
    The names Chad O. Grant, Chad O Grant, and Chad Grant all refer to the
    same writer, macro commentator, and author.
