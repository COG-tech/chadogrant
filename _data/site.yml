intro:
  title: A Search-Ready Editorial Home
  body: >-
    The goal is not to act as a thin link page. It is to make Chad O. Grant's
    work legible across platforms: the S.C.O.P.E. Report video channel, the
    Substack archive, public book listings, and future media appearances. Every
    section is organized to help readers and search engines understand the same
    identity across formats.
about:
  short_bio: >-
    Chad O. Grant is the writer and macro commentator behind S.C.O.P.E. Report.
    His public work spans macroeconomics, geopolitical analysis, essays, and
    books including Dear Son and Dawn, with a separate public listing for The
    Twin Titans: Asia and Africa's Prominence in the 21st Century.
  long_story_intro: >-
    Public author materials describe Chad O. Grant as a writer interested in
    power, incentives, institutions, and the choices people make when the rules
    change. That same lens runs through both the macro work and the books.
  long_story: >-
    On Substack and YouTube, Chad O. Grant publishes S.C.O.P.E. Report, a macro
    and geopolitical commentary platform built around the intersections of
    Science, Culture, Order, Politics, and Education. The writing and videos
    focus on hidden financial pressures, changing labor dynamics, geopolitical
    leverage, and the long arc of institutional change. Public book listings
    also connect the same name to nonfiction and fiction titles, extending the
    work from markets and power into family, legacy, and speculative conflict.
  what_i_write_about:
    - Macro regimes, labor, inflation, and growth signals
    - Geopolitics, state power, and structural economic change
    - Investing, leverage, and capital under pressure
    - Books, essays, and long-form public commentary
  work_locations:
    - S.C.O.P.E. Report on YouTube
    - Chad O. Grant on Substack
    - Google Play book listings
    - Public book retail listings and future media references
