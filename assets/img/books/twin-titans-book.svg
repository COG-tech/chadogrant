<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 960" role="img" aria-labelledby="title desc">
  <title id="title">Editorial cover for The Twin Titans</title>
  <desc id="desc">Editorial fallback cover using the title The Twin Titans.</desc>
  <rect width="720" height="960" rx="42" fill="#0e2132"/>
  <rect x="54" y="54" width="612" height="852" rx="28" fill="#153046" stroke="#d8c6a7" stroke-width="2"/>
  <text x="90" y="180" fill="#d8c6a7" font-family="Arial, sans-serif" font-size="26" letter-spacing="9">CHAD O. GRANT</text>
  <text x="90" y="350" fill="#f5efe6" font-family="Georgia, serif" font-size="90">The Twin</text>
  <text x="90" y="430" fill="#f5efe6" font-family="Georgia, serif" font-size="90">Titans</text>
  <text x="90" y="520" fill="#d7c4a5" font-family="Arial, sans-serif" font-size="25" letter-spacing="4">ASIA AND AFRICA'S PROMINENCE</text>
  <text x="90" y="562" fill="#d7c4a5" font-family="Arial, sans-serif" font-size="25" letter-spacing="4">IN THE 21ST CENTURY</text>
  <circle cx="560" cy="260" r="76" fill="#9a6a2f" opacity="0.22"/>
  <circle cx="500" cy="720" r="126" fill="#f4efe6" opacity="0.08"/>
