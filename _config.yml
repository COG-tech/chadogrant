title: Chad O. Grant
email: ""
description: >-
  Chad O. Grant is the creator of S.C.O.P.E. Report, publishing macroeconomic,
  geopolitical, and long-cycle analysis across videos, articles, and books.
url: "https://cog-tech.github.io"
baseurl: "/chadogrant"
markdown: kramdown
permalink: pretty

collections:
  books:
    output: true
    permalink: /books/:name/
  media:
    output: true
    permalink: /media/:name/
  videos:
    output: true
    permalink: /videos/:name/
  articles:
    output: true
    permalink: /articles/:name/

defaults:
  - scope:
      path: ""
    values:
      layout: page
      image: /assets/img/og-default.svg
  - scope:
      path: ""
      type: books
    values:
      layout: book
      section: books
      body_class: page-body page-books
  - scope:
      path: ""
      type: videos
    values:
      layout: video
      section: videos
      body_class: page-body page-videos
      image: /assets/img/og-default.svg
  - scope:
      path: ""
      type: articles
    values:
      layout: article
      section: articles
      body_class: page-body page-articles
      image: /assets/img/og-default.svg
  - scope:
      path: ""
      type: media
    values:
      layout: media-item
      section: media
      body_class: page-body page-media
      image: /assets/img/og-default.svg

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md

plugins: []
